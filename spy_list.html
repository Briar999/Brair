<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>如鸢 · 绣衣楼攻略集</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            padding-top: 80px;
            padding-bottom: 80px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        /* 导航栏内的筛选栏 */
        .nav-filter {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-filter label {
            font-size: 14px;
            font-weight: 500;
            color: #f0e6d2;
        }
        .nav-filter select {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid rgba(200, 160, 100, 0.4);
            border-radius: 8px;
            background: rgba(20, 18, 22, 0.8);
            color: #f0e6d2;
            cursor: pointer;
        }
        .nav-filter select:focus {
            outline: none;
            border-color: #dba46a;
        }
        .page-title {
            text-align: center;
            margin: 32px 0 40px;
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f5deb3, #d4a86a, #c99652);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(212, 168, 106, 0.3);
            position: relative;
        }
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a86a, transparent);
        }
        #spyListWrap {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
            justify-items: center;
        }
       /* 卡片容器 - 相对定位，用于叠加文字 */
        #spyListWrap .card {
            cursor: pointer;
            transition: all 0.25s;
            display: block !important;
            width: 140px !important;
            background: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            backdrop-filter: none !important;
            padding: 0 !important;
            margin: 0 !important;
            position: relative !important;      /* 关键：让子元素可以绝对定位 */
            height: auto !important;
            min-height: auto !important;
            overflow: visible !important;
        }
        #spyListWrap .card:hover {
            transform: translateY(-6px);
        }

        /* 图片容器 */
        #spyListWrap .card-img {
            width: 140px !important;
            height: auto !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 0 !important;
            display: block !important;
            overflow: visible !important;
            position: relative !important;
        }
        #spyListWrap .card-img img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        /* 文字信息 - 直接显示在图片上方，居中 */
        #spyListWrap .card-content {
            position: absolute !important;
            bottom: 12px !important;            /* 距离图片底部 12px */
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
            text-align: center !important;
            background: rgba(0, 0, 0, 0.65) !important;  /* 半透明黑底，增加可读性 */
            backdrop-filter: blur(4px) !important;
            padding: 6px 10px !important;
            border-radius: 8px !important;
            display: block !important;          /* 始终显示，不再隐藏 */
            opacity: 1 !important;
            white-space: normal !important;     /* 允许换行 */
            overflow: visible !important;
            text-overflow: clip !important;
            transition: all 0.3s ease;
            pointer-events: none;               /* 让点击穿透到卡片 */
        }
        #spyListWrap .card-content h3 {
            font-size: 0.85rem !important;
            margin-bottom: 2px !important;
            color: #f6e2bd !important;
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px !important;
        }
        #spyListWrap .card-content p {
            font-size: 0.65rem !important;
            color: #d4c8a8 !important;
            line-height: 1.3 !important;
            background: transparent !important;
            margin: 0 !important;
            opacity: 0.9 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        /* 悬停时稍微放大文字区域，增强交互感 */
        #spyListWrap .card:hover .card-content {
            background: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(6px) !important;
        }
        
        @media (max-width: 1024px) {
            #spyListWrap { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 768px) {
            #spyListWrap { grid-template-columns: repeat(3, 1fr); }
            .nav-filter { gap: 10px; flex-wrap: wrap; }
            .nav-filter select { min-width: 100px; }
        }
        @media (max-width: 480px) {
            #spyListWrap { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- 导航栏：只显示筛选栏 + 头像 -->
<div class="navbar-wrapper" id="navbar">
    <div class="nav-inner">
        <div class="logo-area">
            <h1>绣衣楼·攻略集</h1>
            <p>代号鸢 | 如鸢 · 权谋深处见真情</p>
        </div>
        <div class="nav-right">
            <!-- 筛选栏（直接放在导航栏上） -->
            <div class="nav-filter">
                <label>属性：</label>
                <select id="elementFilter">
                    <option value="">全部</option>
                    <option value="火">火</option>
                    <option value="水">水</option>
                    <option value="风">风</option>
                    <option value="地">地</option>
                    <option value="阴">阴</option>
                    <option value="阳">阳</option>
                </select>
                <label>职业：</label>
                <select id="careerFilter">
                    <option value="">全部</option>
                    <option value="破军">破军</option>
                    <option value="神纪">神纪</option>
                    <option value="岐黄">岐黄</option>
                    <option value="龙盾">龙盾</option>
                    <option value="诡道">诡道</option>
                </select>
            </div>
            <!-- 头像 -->
            <div id="navAvatarContainer">
                <img id="navAvatar" src="" alt="头像" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #b68953; cursor: pointer; display: none;">
            </div>
        </div>
    </div>
</div>

<div class="container">
    <h1 class="page-title">密探培养</h1>
    <div id="spyListWrap"></div>
</div>

<!-- 固定底部版权栏 -->
<div class="footer-bar">
    <div class="footer-bar-content">
        <p>非官方攻略站 · 图片版权归灵犀互娱所有 | 绣衣楼愿为殿下尽绵薄之力</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        const SUPABASE_URL = 'https://qwddwbwgichjhrxmswgk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nq5d-vnTaJ46JA0MfY-qmQ_kUqPi-Sq';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const elementFilter = document.getElementById('elementFilter');
        const careerFilter = document.getElementById('careerFilter');
        const listWrap = document.getElementById('spyListWrap');

        async function loadNavbarAvatar() {
            const { data: { user } } = await supabase.auth.getUser();
            const DEFAULT_AVATAR_URL = 'https://qwddwbwgichjhrxmswgk.supabase.co/storage/v1/object/public/avatars/1.png';
            const navAvatar = document.getElementById('navAvatar');
            if (user && navAvatar) {
                navAvatar.src = user.user_metadata?.avatar_url || DEFAULT_AVATAR_URL;
                navAvatar.style.display = 'block';
                navAvatar.onclick = () => window.location.href = 'profile.html';
            } else if (navAvatar) {
                navAvatar.style.display = 'none';
            }
        }

        async function loadSpyList() {
            listWrap.innerHTML = '';
            const selectElement = elementFilter.value;
            const selectCareer = careerFilter.value;

            let query = supabase
                .from('spy_info')
                .select('id, spy_name, list_img, element, career')
                .order('create_at', { ascending: false });

            if (selectElement) query = query.eq('element', selectElement);
            if (selectCareer) query = query.eq('career', selectCareer);

            const { data, error } = await query;
            if (error) {
                listWrap.innerHTML = '<p style="text-align:center;grid-column:1/-1;">数据加载失败</p>';
                return;
            }
            if (data.length === 0) {
                listWrap.innerHTML = '<p style="text-align:center;grid-column:1/-1;">暂无对应密探数据</p>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = `spy_detail.html?id=${item.id}`;
                let imgUrl = '';
                if (item.list_img) {
                    if (item.list_img.startsWith('http')) {
                        imgUrl = item.list_img;
                    } else {
                        imgUrl = supabase.storage.from('spy-images').getPublicUrl(item.list_img).data.publicUrl;
                    }
                }
                card.innerHTML = `
                    <div class="card-img">
                        <img src="${imgUrl}" alt="${item.spy_name}">
                    </div>
                    <div class="card-content">
                        <h3>${item.spy_name}</h3>
                        <p>属性：${item.element}｜职业：${item.career}</p>
                    </div>
                `;
                listWrap.appendChild(card);
            });
        }

        elementFilter.addEventListener('change', loadSpyList);
        careerFilter.addEventListener('change', loadSpyList);
        window.onload = () => {
            loadNavbarAvatar();
            loadSpyList();
        };
    })();
</script>
</body>
</html>
