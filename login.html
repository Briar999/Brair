<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>登录 · 绣衣楼攻略集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 24px 60px;
        }
        .login-card {
            background: rgba(30, 25, 22, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(198, 158, 98, 0.4);
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #f3e2b5, #cfab7b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #e1c394;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 18, 22, 0.8);
            border: 1px solid rgba(198, 158, 98, 0.3);
            border-radius: 12px;
            color: #e9e4d4;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #b68953, #9a6e3e);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .switch-mode {
            text-align: center;
            margin-top: 24px;
            color: #8a7a64;
        }
        .switch-mode a {
            color: #dba46a;
            cursor: pointer;
        }
        .msg-area {
            margin-top: 16px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .msg-error {
            background: rgba(220, 80, 60, 0.2);
            color: #e68a6a;
            border: 1px solid rgba(220,80,60,0.3);
        }
        .msg-success {
            background: rgba(80, 180, 120, 0.2);
            color: #8bcb9a;
            border: 1px solid rgba(80,180,120,0.3);
        }
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        .back-home a {
            color: #8a7a64;
            text-decoration: none;
        }
        .back-home a:hover {
            color: #dba46a;
        }
    </style>
</head>
<body>

<div class="navbar-wrapper">
    <div class="nav-inner">
        <div class="logo-area">
            <h1>绣衣楼·攻略集</h1>
            <p>代号鸢 | 如鸢 · 权谋深处见真情</p>
        </div>
        <div class="nav-right">
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="index.html#cultivate">密探培养</a></li>
                    <li><a href="index.html#team">关卡配队</a></li>
                    <li><a href="index.html#events">楼中雅集</a></li>
                    <li><a href="profile.html" id="navProfile" style="display:none;">个人主页</a></li>
                    <li><a href="login.html" id="navAuth">登录</a></li>
                </ul>
            </nav>
            <div id="navAvatarContainer">
                <img id="navAvatar" src="" alt="头像" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #b68953; cursor: pointer; display: none;">
            </div>
        </div>
    </div>
</div>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2 id="formTitle">登录绣衣楼</h2>
            <p id="formSubtitle">欢迎回来，殿下</p>
        </div>
        
        <div class="input-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        
        <div class="input-group" id="nicknameGroup" style="display: none;">
            <label>昵称</label>
            <input type="text" id="nickname" placeholder="如何在绣衣楼称呼您？">
        </div>
        
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <button class="btn-login" id="submitBtn">登 录</button>
        
        <div class="msg-area" id="msgArea"></div>
        
        <div style="margin: 16px 0; text-align: center; position: relative;">
            <span style="background: rgba(30,25,22,0.85); padding: 0 12px; color: #8a7a64; font-size: 0.8rem;">或</span>
        </div>
        <button class="btn-login" id="passkeyLoginBtn" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);">
            🔐 人脸/指纹登录
        </button>
        
        <div class="switch-mode">
            <span id="switchText">还没有账号？</span>
            <a id="switchLink">立即注册</a>
        </div>
        
        <div class="back-home">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0/dist/umd/supabase.js"></script>
<script>
    var SUPABASE_URL = 'https://qwddwbwgichjhrxmswgk.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_nq5d-vnTaJ46JA0MfY-qmQ_kUqPi-Sq';
    
    var _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
            experimental: {
                passkey: true
            }
        }
    });
    
    var isLoginMode = true;
    
    var emailInput = document.getElementById('email');
    var passwordInput = document.getElementById('password');
    var nicknameInput = document.getElementById('nickname');
    var nicknameGroup = document.getElementById('nicknameGroup');
    var submitBtn = document.getElementById('submitBtn');
    var formTitle = document.getElementById('formTitle');
    var formSubtitle = document.getElementById('formSubtitle');
    var switchText = document.getElementById('switchText');
    var switchLink = document.getElementById('switchLink');
    var msgArea = document.getElementById('msgArea');
    
    function showMessage(msg, isError) {
        if (isError === undefined) isError = true;
        msgArea.textContent = msg;
        msgArea.className = 'msg-area ' + (isError ? 'msg-error' : 'msg-success');
        msgArea.style.display = 'block';
        setTimeout(function() {
            msgArea.style.display = 'none';
        }, 3000);
    }
    
    function switchMode() {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            formTitle.textContent = '登录绣衣楼';
            formSubtitle.textContent = '欢迎回来，殿下';
            submitBtn.textContent = '登 录';
            switchText.textContent = '还没有账号？';
            switchLink.textContent = '立即注册';
            nicknameGroup.style.display = 'none';
        } else {
            formTitle.textContent = '注册新账号';
            formSubtitle.textContent = '加入绣衣楼，共享攻略心得';
            submitBtn.textContent = '注 册';
            switchText.textContent = '已有账号？';
            switchLink.textContent = '立即登录';
            nicknameGroup.style.display = 'block';
        }
        console.log('当前模式:', isLoginMode ? '登录' : '注册');
    }
    
    switchLink.addEventListener('click', function(e) {
        e.preventDefault();
        switchMode();
    });
    
    async function handleLogin() {
        var email = emailInput.value.trim();
        var password = passwordInput.value;
        if (!email || !password) {
            showMessage('请填写邮箱和密码');
            return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = '登录中...';
        try {
            var result = await _supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            if (result.error) throw result.error;
            showMessage('登录成功！正在跳转...', false);
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 1000);
        } catch (error) {
            showMessage('登录失败：' + (error.message || '邮箱或密码错误'));
            submitBtn.disabled = false;
            submitBtn.textContent = '登 录';
        }
    }
    
    async function handleRegister() {
        var email = emailInput.value.trim();
        var password = passwordInput.value;
        var nickname = nicknameInput.value.trim();
        if (!email || !password) {
            showMessage('请填写邮箱和密码');
            return;
        }
        if (password.length < 6) {
            showMessage('密码长度至少6位');
            return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';
        try {
            var result = await _supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: nickname || email.split('@')[0]
                    }
                }
            });
            if (result.error) throw result.error;
            if (result.data.user) {
                showMessage('注册成功！请登录', false);
                setTimeout(function() {
                    switchMode();
                    emailInput.value = email;
                    passwordInput.value = '';
                    nicknameInput.value = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登 录';
                }, 1500);
            } else {
                showMessage('注册失败，邮箱可能已被使用');
                submitBtn.disabled = false;
                submitBtn.textContent = '注 册';
            }
        } catch (error) {
            showMessage('注册失败：' + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = '注 册';
        }
    }
    
    submitBtn.addEventListener('click', function() {
        if (isLoginMode) {
            handleLogin();
        } else {
            handleRegister();
        }
    });
    
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (isLoginMode) handleLogin();
            else handleRegister();
        }
    });
    
    // ===== Passkey 登录（一步式 API） =====
    document.getElementById('passkeyLoginBtn').addEventListener('click', async function() {
        console.log('✅ Passkey 登录按钮被点击');
        try {
            if (!window.PublicKeyCredential) {
                alert('您的浏览器不支持 WebAuthn');
                return;
            }
            console.log('开始 Passkey 登录...');
            // ⭐ 一步式 API：直接调用 signInWithPasskey
            var result = await _supabaseClient.auth.signInWithPasskey();
            if (result.error) throw result.error;
            console.log('登录成功:', result.data);
            showMessage('✅ 登录成功！正在跳转...', false);
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 1000);
        } catch (error) {
            console.error('❌ 登录失败:', error);
            showMessage('❌ 登录失败: ' + error.message);
        }
    });
    
    _supabaseClient.auth.getSession().then(function(result) {
        if (result.data.session) {
            window.location.href = 'profile.html';
        }
    });
</script>
</body>
</html>
